<style>
  :root {
    --bg: #f5f2eb;
    --surface: #fff;
    --border: #d9d3c7;

    --accent: #c0392b;
    --accent-light: #fdf0ee;
    --green: #1a6b3c;
    --green-light: #eaf4ee;
    --gold: #b5860d;

    --blue: #1a3a6b;

    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; padding-bottom: 100px; }

  /* ── Header */
  header { background: var(--ink); color: #fff; padding: 20px 20px; display: flex; align-items: center; gap: 14px; }
  header a { color: #c9c0b8; text-decoration: none; font-size: 0.82rem; border: 1px solid #444; padding: 5px 11px; border-radius: 4px; white-space: nowrap; }
  header a:hover { background: #333; color: #fff; }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 1.45rem; font-weight: 400; }
  .subtitle { font-size: 0.72rem; color: #999; margin-top: 2px; letter-spacing: 0.05em; text-transform: uppercase; }

  /* ── Tabs */
  .tabs { display: flex; padding: 20px 20px 0; border-bottom: 2px solid var(--border); background: var(--bg); }
  .tab { padding: 8px 16px; cursor: pointer; font-size: 0.84rem; font-weight: 500; color: var(--ink-light); border: 2px solid transparent; border-bottom: none; border-radius: 8px 8px 0 0; background: transparent; transition: all 0.2s; margin-bottom: -2px; }
  .tab:hover { color: var(--ink); background: #ece8e0; }
  .tab.active { background: var(--surface); color: var(--ink); border-color: var(--border); border-bottom-color: var(--surface); font-weight: 600; }
  .badge { display: inline-block; font-size: 0.65rem; padding: 1px 6px; border-radius: 20px; margin-left: 5px; font-weight: 600; vertical-align: middle; }
  .tab:nth-child(1) .badge { background: var(--green-light); color: var(--green); }
  .tab:nth-child(2) .badge { background: var(--gold-light); color: var(--gold); }
  .tab:nth-child(3) .badge { background: var(--accent-light); color: var(--accent); }

  /* ── Content */
  .content { padding: 22px 20px; max-width: 860px; }
  .level { display: none; }
  .level.active { display: block; }

  /* ── Fortschritt */
  .fortschritt-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
  .fortschritt-fill { height: 100%; background: linear-gradient(90deg, var(--green), #2ecc71); border-radius: 2px; transition: width 0.4s ease; width: 0%; }

  /* ── Karte */
  .karte { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; margin-bottom: 18px; box-shadow: var(--shadow); animation: einblenden 0.3s ease; }
  @keyframes einblenden { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .aufgaben-nr { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-light); font-weight: 600; margin-bottom: 7px; }
  .karte h3 { font-family: 'DM Serif Display', serif; font-size: 1.08rem; font-weight: 400; margin-bottom: 9px; line-height: 1.4; }
  .karte p { font-size: 0.88rem; color: var(--ink-light); line-height: 1.6; margin-bottom: 12px; }

  /* ── Typ-Badge */
  .typ { display: inline-block; font-size: 0.68rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; letter-spacing: 0.04em; margin-bottom: 9px; }
  .typ-berechnung { background: var(--blue-light); color: var(--blue); }
  .typ-analyse    { background: var(--gold-light); color: var(--gold); }
  .typ-vergleich  { background: #f0eaff; color: #5b2d9e; }
  .typ-fallstudie { background: var(--accent-light); color: var(--accent); }

  /* ── Tabellen */
  .btab { width: 100%; border-collapse: collapse; font-size: 0.84rem; font-family: 'DM Mono', monospace; margin-bottom: 14px; }
  .btab th { background: var(--ink); color: #fff; padding: 6px 10px; text-align: left; font-family: 'DM Sans', sans-serif; font-size: 0.75rem; letter-spacing: 0.04em; font-weight: 600; }
  .btab td { padding: 5px 10px; border-bottom: 1px solid var(--border); }
